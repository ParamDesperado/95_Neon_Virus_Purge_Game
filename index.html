<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Neon Virus Purge - A cyberpunk browser game. Defend the Core, purge the Glitch. Built by Param Sangani, inspired by Space Invaders.">
    <title>Neon Virus Purge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-item">Agent: <span id="hud-name"></span></div>
            <div class="hud-item">Score: <span id="hud-score">0000</span></div>
        </div>

        <!-- The Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Start Screen Overlay -->
        <div id="start-screen" class="overlay active">
            <h1 class="glitch" data-text="NEON VIRUS PURGE">NEON VIRUS PURGE</h1>
            <p class="subtitle">Defend the Core. Purge the Glitch.</p>

            <div class="controls-hint">
                <span>← → Move</span>
                <span class="divider">|</span>
                <span>SPACE Shoot</span>
            </div>

            <div class="input-group">
                <input type="text" id="player-name" placeholder="Enter Agent Name" maxlength="15" autocomplete="off" spellcheck="false">
            </div>

            <button id="start-btn" class="neon-btn">INITIALIZE</button>

            <div class="high-scores-panel">
                <h3>⚡ TOP AGENTS</h3>
                <ul id="start-high-scores">
                    <!-- Scores populated by JS -->
                </ul>
            </div>

            <div class="credits">
                Inspired by Space Invaders &nbsp;|&nbsp; Credit to Param Sangani
            </div>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-screen" class="overlay hidden">
            <h1 id="game-over-title" class="glitch">SYSTEM INFECTED</h1>
            <p id="game-over-subtitle" class="subtitle"></p>

            <div class="stats-panel">
                <p>Final Score: <span id="final-score" class="highlight">0000</span></p>
            </div>

            <div class="high-scores-panel">
                <h3>⚡ TOP AGENTS</h3>
                <ul id="game-over-high-scores">
                    <!-- Scores populated by JS -->
                </ul>
            </div>

            <div class="btn-row">
                <button id="restart-btn" class="neon-btn">REBOOT SYSTEM</button>
                <button id="menu-btn" class="neon-btn secondary">MAIN MENU</button>
            </div>

            <div class="credits">
                Inspired by Space Invaders &nbsp;|&nbsp; Credit to Param Sangani
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
